    put:
      tags:
        - admin
      summary: Update member from member API
      security:
        - auth: []
          authMethod: []      
      parameters:
        - name: userId
          in: path
          description: ID of user
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
