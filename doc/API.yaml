openapi: 3.0.0
info:
  description: 會員植物管理系統
  version: 0.0.0
  title: Plant Manager
tags:
  - name: user
    description: 使用者 API
  - name: admin
    description: 管理員 API
paths:
  /user:
    get:
      tags:
        - user
      summary: Get User from token
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Query Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
  /user/login:
    post:
      tags:
        - user
      summary: Login
      requestBody:
        $ref: '#/components/requestBodies/auth'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid body"
        '401':
          description: Invalid user or password!
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid user or password!"
  /user/register:
    post:
      tags:
        - user
      summary: Register
      requestBody:
        $ref: "#/components/requestBodies/userRegister"
      responses:
        '200':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Registration success"
        '400':
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid body"
        '404':
          description: Registration failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Membership not found"
        '409':
          description: User already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "User already exist"
  /user/password:
    post:
      tags:
        - user
      summary: Reset Password Request
      requestBody:
        $ref: "#/components/requestBodies/userRegister"
      responses:
        '200':
          description: Request success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Request success"
        '400':
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid body"
        '404':
          description: Unknown User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "User not found"

    put:
      tags:
        - user
      summary: Change the password
      security:
        - auth: []
          authMethod: []
      requestBody:
        content:
          application/json:
              schema:
                properties:
                  password:
                    type: string
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Password updated"
        '400':
          description: Invalid header/body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header/body"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
  /rent/list/others:
    get:
      tags:
        - user
      summary: Get other user's plant information
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Send other's information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtherUserPlantResponse'
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
  /rent/register:
    post:
      tags:
        - user
      summary: Rent registration
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  waiting:
                    type: boolean
              example:
                message: "Registration successful"
                waiting: true
        # '403':
        #   description: Registration failed
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '409':
          description: Too many rents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Too many rents"
  /rent/plantInfo:
    post:
      tags:
        - user
      summary: Add plant information
      security:
        - auth: []
          authMethod: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                rent:
                  type: integer
                  format: int32
                name:
                  type: string
                intro:
                  type: string
                image:
                  type: string
                  format: binary
                nickname:
                  type: string
                minHumid:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Update successful"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              examples:
                "Header error":
                  value:
                    message: "Invalid header"
                "Body error":
                  value:
                    message: "Invalid body"
                "File type unexpected":
                  value:
                    message: "Unexpected field"
                "File too large":
                  value:
                    message: "File too large"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '404':
          description: Requested rent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Requested rent not found"
        '409':
          description: Plant already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Plant already exist"
  '/rent/plantInfo/{rentId}':
    put:
      tags:
        - user
      summary: Modify plant information
      parameters:
      - name: rentId
        in: path
        description: ID of rent
        required: true
        schema:
          type: integer
          format: int64
      security:
        - auth: []
          authMethod: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                intro:
                  type: string
                image:
                  type: string
                  format: binary
                nickname:
                  type: string
                minHumid:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Update successful"
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '404':
          description: Requested rent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Requested rent not found"

  /admin/rentedInfo:
    get:
      tags:
        - admin
      summary: Get rented list
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Query Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminRent'
                        # id:
                        #   type: integer
                        # name: 
                        #   type: string
                        # email:
                        #   type: string
                        # plantName:
                        #   type: string
                        # imgPath:
                        #   type: string
                        # humid:
                        #   type: number
                        # light:
                        #   type: integer
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"

  /admin/waitList:
    get:
      tags:
        - admin
      summary: Get rents waiting for container
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Query Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties: 
                        name: 
                          type: string
                        email:
                          type: string
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '404':
          description: Rent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Rent not found"
  /admin/rentedAmount:
    get:
      tags:
        - admin
      summary: Get rented amount
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Query Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties: 
                      rented: 
                        type: integer
                      remain:
                        type: integer
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"

  '/admin/rent/{rentId}':
    put:
      tags:
        - admin
      summary: Set container of rent as taken
      security:
        - auth: []
          authMethod: []
      parameters:
      - name: rentId
        in: path
        description: ID of rent
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Update successful"
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"
        '404':
          description: Rent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Rent not found"
        '409':
          description: Rent already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Rent already taken"

    delete:
      tags:
        - admin
      summary: Remove rent by id
      security:
        - auth: []
          authMethod: []
      parameters:
      - name: rentId
        in: path
        description: ID of rent
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Delete successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Delete successful"
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"
        '404':
          description: Rent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Rent not found"

  '/admin/members':
    get:
      tags:
        - admin
      summary: Get cached and registered member list
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Query success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      registeredMembers:
                        type: array
                        items:
                          $ref: '#/components/schemas/Member'
                      cachedMembers:
                        type: array
                        items:
                          $ref: '#/components/schemas/Member'
                      notMemberAccounts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Member'
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"
    put:
      tags:
        - admin
      summary: Update member list from member api
      security:
        - auth: []
          authMethod: []
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Update successful"
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"
