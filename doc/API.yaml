      responses:
        '200':
          description: Query Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: Invalid header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid header"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"
    put:
      tags:
        - admin
      summary: Modify config
      security:
        - auth: []
          authMethod: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Update successful"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              examples:
                'Invalid header':
                  value:
                    message: "Invalid header"
                'Invalid body':
                  value:
                    message: "Invalid body"
        '401':
          description: Invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Invalid JWT token"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                message: "Permission denied"

# components
components:
  securitySchemes:
    auth:
      type: apiKey
      in: header
      name: Auth
    authMethod:
      type: apiKey
      in: header
      name: Auth-Method
  requestBodies:
    auth:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRequest'
      description: 登入資訊
      required: true
    userRegister:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserRegisterRequest'
      description: 註冊資訊
      required: true
  schemas:

    # data
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        isDefaultPassword:
          type: boolean
        role:
          type: integer
    # data
    Member:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        updatedName:
          type: string
        email:
          type: string
        updatedEmail:
          type: string
    Rent:
      type: object
      properties:
        plant:
          $ref: '#/components/schemas/Plant'
        container:
          type: integer
          format: int32
    AdminRent:
      type: object
      properties:
        id:
          type: integer
          format: int32
        owner:
          $ref: '#/components/schemas/User'
        plant:
          $ref: '#/components/schemas/Plant'
        container:
          type: integer
          format: int32
    Plant:
      type: object
      properties:
        name:
          type: string
        intro:
          type: string
        imgPath:
          type: string
        nickName:
          type: string
        minHumid:
          type: integer
          format: int32
    Config:
      type: object
      properties:
        deadline:
          type: integer
        rentLimit:
          type: integer
    ConfigHistory:
      type: object
      properties:
        deadline:
          type: integer
        rentLimit:
          type: integer
        updatedBy:
          type: string
        updatedAt:
          type: string
          format: date-time
    ConfigData:
      type: object
      properties:
        current:
          $ref: '#/components/schemas/Config'
        history:
          type: array
          items:
            $ref: '#/components/schemas/ConfigHistory'

    # request
    AuthRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    UserRegisterRequest:
      type: object
      properties:
        email:
          type: string

    # response
    LoginSuccessResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
        rents:
          type: array
          items:
            $ref: '#/components/schemas/Rent'
    GenericResponse:
      type: object
      properties:
        message:
          type: string
    UserResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        rents:
          type: array
          items:
            $ref: '#/components/schemas/Rent'
    OtherUserPlantResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Rent'
    ConfigResponse:
      type: object
      properties:
        message:
          type: string
        data:
         $ref: '#/components/schemas/ConfigData'
